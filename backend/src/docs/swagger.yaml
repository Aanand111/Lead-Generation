openapi: 3.0.0
info:
  title: Lead Generation App API
  description: Backend APIs for Admin, Vendor, and User Panels
  version: 1.0.0
  contact:
    email: admin@leadgenapp.com

servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API server.
      tags:
        - General
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "UP"
                  timestamp:
                    type: string
                    format: date-time
        '500':
          description: Internal Server Error

  /auth/register:
    post:
      summary: User registration
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+919876543210"
                password:
                  type: string
                  example: "securePassword123"
                role:
                  type: string
                  enum: [user, vendor]
                  example: "user"
                referral_code:
                  type: string
                  example: "REF12345"
      responses:
        '201':
          description: OTP sent
        '400':
          description: Bad request

  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+919876543210"
                password:
                  type: string
                  example: "securePassword123"
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUz..."
                  user:
                    type: object
        '401':
          description: Unauthorized

  /admin/users:
    get:
      summary: Get all users and vendors
      description: Retrieve a paginated list of all users and vendors. Admin access required.
      tags:
        - Admin - User Management
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term for phone or full name
      responses:
        '200':
          description: Successful response
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Not an admin)

  /admin/users/{id}/block:
    put:
      summary: Block or unblock a user
      description: Change the status of a user to blocked or active.
      tags:
        - Admin - User Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - isBlocked
              properties:
                isBlocked:
                  type: boolean
                  description: True to block, false to unblock.
      responses:
        '200':
          description: User status updated successfully
        '404':
          description: User not found

  /admin/users/{id}/wallet:
    put:
      summary: Update user wallet balance
      description: Add or deduct balance from a user/vendor wallet.
      tags:
        - Admin - User Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - actionType
              properties:
                amount:
                  type: number
                  description: The amount to be adjusted.
                  example: 50.00
                actionType:
                  type: string
                  enum: [CREDIT, DEBIT]
                  description: Whether to add or remove funds.
                remarks:
                  type: string
                  description: Optional note regarding this transaction.
      responses:
        '200':
          description: Wallet updated successfully
        '400':
          description: Invalid request body
        '404':
          description: User not found

  /admin/users/{id}/referrals:
    get:
      summary: Get user direct referral tree
      description: Retrieve the list of users directly referred by a specific user or vendor.
      tags:
        - Admin - User Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      responses:
        '200':
          description: Referral tree retrieved successfully

  /admin/leads:
    post:
      summary: Upload a new lead
      description: Create a single lead in the system. Admin only.
      tags:
        - Admin - Lead Management
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - customer_phone
                - city
              properties:
                title:
                  type: string
                description:
                  type: string
                customer_name:
                  type: string
                customer_phone:
                  type: string
                customer_email:
                  type: string
                business_type:
                  type: string
                requirements:
                  type: string
                city:
                  type: string
                state:
                  type: string
                pincode:
                  type: string
                lead_value:
                  type: number
      responses:
        '201':
          description: Lead created successfully
    get:
      summary: Get all leads
      description: Retrieve a paginated list of leads with optional filtering. Admin only.
      tags:
        - Admin - Lead Management
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: ['', AVAILABLE, ACQUIRED, DELETED]
      responses:
        '200':
          description: Successful response

  /admin/leads/{id}/quality:
    put:
      summary: Quality Check Lead
      description: Rate a lead between 1 and 5 and add admin remarks.
      tags:
        - Admin - Lead Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quality_score
              properties:
                quality_score:
                  type: integer
                  minimum: 1
                  maximum: 5
                remarks:
                  type: string
      responses:
        '200':
          description: Quality updated successfully
        '404':
          description: Lead not found

  /admin/leads/{id}:
    delete:
      summary: Delete a lead
      description: Soft delete a lead (sets status to DELETED).
      tags:
        - Admin - Lead Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead deleted successfully
        '404':
          description: Lead not found

  /admin/packages:
    post:
      summary: Add a new package
      description: Create a package (CREDIT_BASED or SUBSCRIPTION) with Leads, Poster, or Both categories.
      tags:
        - Admin - Package Management
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - category
                - price
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [CREDIT_BASED, SUBSCRIPTION]
                category:
                  type: string
                  enum: [Leads, Poster, Both]
                price:
                  type: number
                credits:
                  type: integer
                lead_limit:
                  type: integer
                validity_days:
                  type: integer
                description:
                  type: string
                features:
                  type: object
                is_active:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '201':
          description: Package created successfully
    get:
      summary: Get all packages
      tags:
        - Admin - Package Management
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: activeOnly
          schema:
            type: boolean
          description: Fetch only active packages if true.
      responses:
        '200':
          description: Packages retrieved successfully
          
  /admin/packages/{id}:
    put:
      summary: Update a package
      tags:
        - Admin - Package Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - category
                - price
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [CREDIT_BASED, SUBSCRIPTION]
                category:
                  type: string
                  enum: [Leads, Poster, Both]
                price:
                  type: number
                credits:
                  type: integer
                lead_limit:
                  type: integer
                validity_days:
                  type: integer
                description:
                  type: string
                features:
                  type: object
                is_active:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Package updated successfully
    delete:
      summary: Disable a package
      description: Set is_active to false (Soft delete)
      tags:
        - Admin - Package Management
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Package disabled successfully
