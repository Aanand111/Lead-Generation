version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: leadgen-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-leadgen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    restart: always
    ports:
      - "6379:6379"

  backend-api:
    build: ./backend
    container_name: leadgen-api
    restart: always
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: api
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      API_INSTANCE_COUNT: 1
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  backend-worker:
    build: ./backend
    container_name: leadgen-worker
    restart: always
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: worker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/logs:/app/logs

  backend-scheduler:
    build: ./backend
    container_name: leadgen-scheduler
    restart: always
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: scheduler
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: leadgen-ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-api

volumes:
  pgdata:
