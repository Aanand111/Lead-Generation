version: '3.8'

x-backend-env: &backend-env
  NODE_ENV: production
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: ${DB_NAME}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  JWT_SECRET: ${JWT_SECRET}
  CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
  CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
  CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
  SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
  MSG91_API_KEY: ${MSG91_API_KEY:-}
  TWILIO_SID: ${TWILIO_SID:-}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
  AUTO_RUN_MIGRATIONS: ${AUTO_RUN_MIGRATIONS:-true}
  MIGRATION_LOCK_ID: ${MIGRATION_LOCK_ID:-42851017}

services:
  postgres:
    image: postgres:15-alpine
    container_name: leadgen-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-leadgen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    restart: always
    ports:
      - "6379:6379"

  backend-api:
    build: ./backend
    container_name: leadgen-api
    restart: always
    environment:
      <<: *backend-env
      RUNTIME_ROLE: api
      API_INSTANCE_COUNT: 1
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-}
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs

  backend-worker:
    build: ./backend
    container_name: leadgen-worker
    restart: always
    environment:
      <<: *backend-env
      RUNTIME_ROLE: worker
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/logs:/app/logs

  backend-scheduler:
    build: ./backend
    container_name: leadgen-scheduler
    restart: always
    environment:
      <<: *backend-env
      RUNTIME_ROLE: scheduler
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_BASE_URL: ${VITE_BASE_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    container_name: leadgen-ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend-api

volumes:
  pgdata:
